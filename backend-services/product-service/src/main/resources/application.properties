
# Microservice Application Port Settings
spring.application.name=product-service
server.port=8084

# MySQL Database Routing Connection via Docker
spring.datasource.url=jdbc:mysql://localhost:3307/product_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false

spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Structural Database Mapping Engine Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Java 21 Performance Tuning Optimization: Virtual Threads Implementation
spring.threads.virtual.enabled=true

# Connect to your Docker Kafka container
spring.kafka.bootstrap-servers=localhost:9092

# Deserialization handles converting Kafka JSON bytes back into Java objects
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Crucial: This tells Spring Boot it is safe to deserialize your custom event object
spring.kafka.consumer.properties.spring.json.trusted.packages=*
